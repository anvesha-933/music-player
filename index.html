<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome Icons -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="music-player">

    <!-- Heading -->
    <h1>Music Player</h1>

    <!-- Album Cover -->
    <div class="album-cover">
        <img src="assets/cover1.jfif" alt="Album Cover">
    </div>

    <!-- Song Details -->
    <div class="song-details">
        <h2 id="song-title">Bairan</h2>
        <p id="artist">Banjaree</p>
    </div>

    <!-- Progress Section -->
    <div class="progress-section">

        <span id="current-time">0:00</span>

        <input
            type="range"
            id="progress-bar"
            value="0"
            min="0"
            max="100">

        <span id="duration">3:48</span>

    </div>

    <!-- Controls -->
    <div class="controls">

        <button id="prev">
            <i class="fa-solid fa-backward"></i>
        </button>

        <button id="play">
            <i class="fa-solid fa-play"></i>
        </button>

        <button id="next">
            <i class="fa-solid fa-forward"></i>
        </button>

    </div>

    <!-- Extra Controls -->
    <div class="extra-controls">

        <button id="shuffle">
            <i class="fa-solid fa-shuffle"></i>
        </button>

        <button id="repeat">
            <i class="fa-solid fa-repeat"></i>
        </button>

    </div>

    <!-- Volume -->
    <div class="volume">

        <i class="fa-solid fa-volume-low"></i>

        <input
            type="range"
            id="volume"
            min="0"
            max="100"
            value="80">

    </div>

    <!-- Playlist -->
    <div class="playlist">

        <h3>Playlist</h3>

        <ul>

            <li>🎵 Bairan</li>
            <li>🎵 Abhi Na Jao Chhod Kar</li>
            <li>🎵 Ham Tere Pyaar Mein</li>
            <li>🎵 Ek ajnabee haseena se</li>

        </ul>

    </div>

</div>

    <!-- We will build the player here -->

    <script src="script.js"></script>
</body>
</html>
